<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <title>LeatherWorks Splash</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;

        font-family: Inter, Arial, sans-serif;

        background:
          radial-gradient(
            circle at center,
            #0f2b67 0%,
            #071737 45%,
            #020817 100%
          );

        display: flex;
        align-items: center;
        justify-content: center;

        color: white;
      }

      body {
        animation: fadeIn 0.6s ease;
      }

      /* subtle animated glow */
      body::before {
        content: "";

        position: absolute;

        width: 700px;
        height: 700px;

        background: radial-gradient(
          circle,
          rgba(250, 204, 21, 0.08),
          transparent 70%
        );

        animation: pulse 5s infinite ease-in-out;
      }

      .container {
        position: relative;
        z-index: 2;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

        text-align: center;
      }

      /* logo */
      .logo-wrapper {
        margin-bottom: 18px;

        position: relative;
      }

      .logo {
        font-size: 100px;
        font-weight: 900;
        letter-spacing: -10px;

        display: flex;
        align-items: center;
        justify-content: center;

        line-height: 1;
      }

      .logo .l {
        color: white;
      }

      .logo .w {
        color: #facc15;

        margin-left: -8px;
      }

      /* app name */
      .title {
        font-size: 72px;
        font-weight: 800;

        letter-spacing: -3px;

        margin-bottom: 18px;
      }

      .subtitle {
        font-size: 24px;
        color: #94a3b8;

        margin-bottom: 22px;
      }

      .line {
        width: 120px;
        height: 2px;

        background: #facc15;

        border-radius: 999px;

        margin-bottom: 30px;
      }

      /* company */
      .company {
        color: #cbd5e1;

        font-size: 18px;

        margin-bottom: 40px;
      }

      .company strong {
        color: #facc15;
        font-weight: 700;
      }

      /* loading dots */
      .loader {
        display: flex;
        align-items: center;
        justify-content: center;

        gap: 14px;

        margin-bottom: 60px;
      }

      .dot {
        width: 16px;
        height: 16px;

        border-radius: 50%;

        background: #facc15;

        animation: bounce 1.2s infinite ease-in-out;
      }

      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      /* footer company card */
      .footer {
        display: flex;
        flex-direction: column;
        align-items: center;

        color: #94a3b8;

        font-size: 17px;
      }

      .footer-line {
        width: 340px;
        height: 1px;

        background: rgba(255, 255, 255, 0.15);

        margin-bottom: 28px;

        position: relative;
      }

      .footer-line::after {
        content: "🏢";

        position: absolute;

        left: 50%;
        top: 50%;

        transform: translate(-50%, -50%);

        background: #071737;

        padding: 0 16px;

        font-size: 20px;
      }

      .footer-company {
        color: #facc15;

        font-size: 22px;
        font-weight: 700;

        margin-top: 8px;
        margin-bottom: 8px;
      }

      .footer-tagline {
        font-size: 16px;
        color: #64748b;
      }

      /* animations */

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0.7);
          opacity: 0.4;
        }

        40% {
          transform: scale(1.2);
          opacity: 1;
        }
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 0.6;
        }

        50% {
          transform: scale(1.08);
          opacity: 1;
        }

        100% {
          transform: scale(1);
          opacity: 0.6;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.985);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes fadeOut {
        from {
          opacity: 1;
        }

        to {
          opacity: 0;
        }
      }

      body.fade-out {
        animation: fadeOut 0.5s ease forwards;
      }
    </style>
  </head>

  <body>
    <div class="container">

      <!-- LOGO -->
      <div class="logo-wrapper">
        <div class="logo">
          <span class="l">A</span>
          <span class="w">F</span>
          <span class="l">R</span>
          <span class="w">I</span>
          <span class="l">T</span>
          <span class="w">A</span>
          <span class="l">N</span>
        </div>
      </div>

      <div class="subtitle">
        Gestion d’entreprise
      </div>

      <div class="line"></div>

    
      <div class="loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="footer">

        <div class="footer-line"></div>

        <div>
          Développé par
        </div>

        <div class="footer-company">
          ADB Tech Solutions
        </div>

        <div class="footer-tagline">
          Solutions numériques sur mesure
        </div>

      </div>
    </div>
  </body>
</html>
