name: Build Windows Electron App

on:
  push:
    branches:
      - sql
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Clean previous builds
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          if (Test-Path dist-electron) { Remove-Item dist-electron -Recurse -Force }

      - name: Build React app
        run: npm run build

      - name: Build Electron App
        run: npx electron-builder --win --x64

      - name: Upload Windows Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: leather-works-windows
          path: |
            client/dist-electron/*.exe
            client/dist-electron/*.msi
            client/dist-electron/*.zip
            client/dist-electron/latest.yml
          if-no-files-found: warn

      - name: Show build output
        shell: pwsh
        run: Get-ChildItem -Recurse dist-electron