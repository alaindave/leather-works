name: Build Electron App

on:
  push:
    branches:
      - electron

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./client

      - name: Transpile Electron
        run: npm run transpile:electron
        working-directory: ./client
        
      - name: Build Electron main process
        run: npm run build:electron
        working-directory: ./client

      - name: Build React
        run: npm run build
        working-directory: ./client

      - name: Clean build folders
        run: rm -rf dist dist-electron
        working-directory: ./client
        shell: bash

      - name: Build Electron Windows App
        run: npx electron-builder --win --x64 --publish never
        working-directory: ./client

      - name: Build Electron app (debug mode)
        run: npx electron-builder --win --x64 --publish never --debug
        working-directory: ./client

      - name: Show build output
        run: Get-ChildItem -Recurse
        shell: pwsh
        working-directory: ./client

      - name: Debug output
        run: dir
        working-directory: ./client

      - name: Find EXE files
        shell: pwsh
        run: Get-ChildItem -Path . -Recurse -Filter "*.exe"
        working-directory: ./client

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LeatherWorks-Windows
          path: client/dist/**
        working-directory: ./client